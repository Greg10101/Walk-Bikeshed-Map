<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Walkable WMATA (Precomputed Walksheds)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body { height: 100%; margin: 0; }
    #app { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
    #sidebar {
      padding: 16px;
      background: #013D4A;
      color: #e5e7eb;
      border-right: 1px solid #1f2937;
    }
    #map { width: 100%; height: 100%; }
    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #0b1220;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 6px;
    }
    button {
      background: #1BBF54;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }
    .checkboxes label {
      display: block;
      margin-top: 6px;
    }
    .checkboxes input[type="checkbox"] {
      accent-color: #1BBF54;
    }
  </style>
</head>

<body>
<div id="app">
  <aside id="sidebar">
    <h2>Walkable WMATA</h2>
    <p>Precomputed walking sheds (no API calls)</p>

    <label for="stationSelect">Select a Station from the dropdown:</label>
    <select id="stationSelect"></select>

    <div class="checkboxes">
      <label><input type="checkbox" value="5" checked> 5 minutes</label>
      <label><input type="checkbox" value="10" checked> 10 minutes</label>
      <label><input type="checkbox" value="15" checked> 15 minutes</label>
      <label><input type="checkbox" value="20" checked> 20 minutes</label>
    </div>

    <button id="drawBtn">Show walksheds</button>
  </aside>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* --------------------------------------------------
   BASIC MAP SETUP
-------------------------------------------------- */

const map = L.map("map").setView([38.905, -77.036], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

const walkshedLayer = L.layerGroup().addTo(map);
let stationMarker = null;

/* --------------------------------------------------
   LOAD STATIONS GEOJSON                       ← NEW
   Reads stations.geojson and builds a lookup
   table so we can find any station by its code.
-------------------------------------------------- */

let stationLookup = {};                              // ← NEW

async function loadStations() {                      // ← NEW
  const data = await fetch("stations.geojson").then(r => r.json());
  data.features.forEach(f => {
    // Skip duplicates — some codes share a physical station (e.g. Metro Center)
    if (!stationLookup[f.properties.code]) {
      stationLookup[f.properties.code] = {
        name: f.properties.name,
        lat:  f.geometry.coordinates[1],
        lon:  f.geometry.coordinates[0],
        lines: f.properties.lines
      };
    }
  });
  drawStations();
}                                                    // ← NEW

/* --------------------------------------------------
   LOAD WALKSHED GEOJSON
-------------------------------------------------- */

let walkshedData = null;

async function loadWalksheds() {
  walkshedData = await fetch("walksheds.geojson")
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .catch(err => { console.error("Failed to load walksheds:", err); });
  populateStationDropdown();
}

// Load both files at startup but individually so stations always loads
loadStations();
loadWalksheds();

/* --------------------------------------------------
   UI HELPERS
-------------------------------------------------- */

function populateStationDropdown() {
  const select = document.getElementById("stationSelect");

  const stationIds = [
    ...new Set(walkshedData.features.map(f => f.properties.station_id))
  ].sort();

  stationIds.forEach(id => {
    const option = document.createElement("option");
    option.value = id;
    option.textContent = stationLookup[id]?.name ?? id; // ← CHANGED (was just id)
    select.appendChild(option);
  });
}

function selectedMinutes() {
  return Array.from(
    document.querySelectorAll(".checkboxes input:checked")
  ).map(cb => Number(cb.value));
}

/* --------------------------------------------------
   DRAW WALKSHEDS
-------------------------------------------------- */

function colorForMinutes(min) {
  if (min === 5)  return "#22c55e";
  if (min === 10) return "#f59e0b";
  return "#ef4444";                                  // fallback for any other value
}

/* --------------------------------------------------
   DRAW ALL STATIONS ON LOAD
-------------------------------------------------- */

function drawStations() {
  Object.values(stationLookup).forEach(station => {
    L.circleMarker([station.lat, station.lon], {
      radius: 5,
      color: "#3b82f6",
      fillColor: "#3b82f6",
      fillOpacity: 1
    })
    .bindTooltip(station.name, { permanent: false })
    .addTo(map);
  });
}

function drawWalksheds() {
  if (!walkshedData) return;                         // ← NEW: guard against early click

  const stationId = document.getElementById("stationSelect").value;
  const minutes = selectedMinutes();

  walkshedLayer.clearLayers();

  const filtered = {
    type: "FeatureCollection",
    features: walkshedData.features.filter(f =>
      f.properties.station_id === stationId &&
      minutes.includes(f.properties.minutes)
    )
  };

  const geojsonLayer = L.geoJSON(filtered, {
    style: f => ({
      color: colorForMinutes(f.properties.minutes),
      weight: 1,
      fillOpacity: 0.3
    })
  }).addTo(walkshedLayer);

  if (stationMarker) map.removeLayer(stationMarker);

  // ← CHANGED: use stationLookup instead of grabbing a polygon corner
  const station = stationLookup[stationId];
  if (station) {
    stationMarker = L.circleMarker([station.lat, station.lon], {
      radius: 7,
      color: "#3b82f6",
      fillColor: "#3b82f6",
      fillOpacity: 1
    })
    .bindTooltip(station.name, { permanent: false })
    .addTo(map);
  }

  if (filtered.features.length > 0) {
    map.fitBounds(geojsonLayer.getBounds().pad(0.2));
  }
}

document.getElementById("drawBtn").addEventListener("click", drawWalksheds);
</script>
</body>
</html>
