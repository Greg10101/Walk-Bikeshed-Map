<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Walkable WMATA (Precomputed Walksheds)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Load fonts (open source only) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- Helvetica is WMATA official font, rest are backups -->
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Helvetica, Arial, Inter, sans-serif;
    }

    /* Map fills the full viewport */
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── Floating sidebar ── */
    #sidebar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;

      width: 300px;
      padding: 12px 14px;

      background: #014554;
      color: #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), 0 2px 8px rgba(0, 0, 0, 0.3);

      transition: width 0.3s ease;
      overflow: hidden;
    }

    /* Collapsed: shrink to just button + padding on each side */
    #app.sidebar-collapsed #sidebar {
      width: 46px;
    }

    /* ── Sidebar header ── */
    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      white-space: nowrap;
    }

    #sidebar-header h2 {
      margin: 0;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.15s ease;
    }

    #app.sidebar-collapsed #sidebar-header h2 {
      opacity: 0;
      pointer-events: none;
    }

    #app.sidebar-collapsed #sidebar-header {
      justify-content: center;
    }

    #toggleBtn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 7px;
      background: transparent;
      color: #e5e7eb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      line-height: 1;
      width: auto !important;
      margin-top: 0 !important;
    }

    #toggleBtn svg {
      display: block;
      width: 16px;
      height: 16px;
      transition: transform 0.3s ease;
    }

    /* Expanded: chevron points left (click will collapse leftward) */
    #toggleBtn svg { transform: rotate(0deg); }

    /* Collapsed: chevron points right (click will expand rightward) */
    #app.sidebar-collapsed #toggleBtn svg { transform: rotate(180deg); }

    /* ── Collapsible content ── */
    #sidebar-content {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.3s ease;
    }

    #sidebar-content.expanded {
      max-height: 520px;
      opacity: 1;
      margin-top: 10px;
    }

    #sidebar-content.collapsed {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    /* ── Form controls ── */
    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #0b1220;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      background: #1BBF54;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }

    .checkboxes label {
      display: block;
      margin-top: 6px;
    }

    .checkboxes input[type="checkbox"] {
      accent-color: #1BBF54;
    }
    /* ── Move Leaflet zoom controls to top-right ── */
    .leaflet-top.leaflet-left .leaflet-control-zoom {
      display: none;
    }
    .leaflet-top.leaflet-right {
      top: 16px;
      right: 16px;
    }
    .leaflet-top.leaflet-right .leaflet-control-zoom {
      margin: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }
    .leaflet-control-zoom-in,
    .leaflet-control-zoom-out {
      background: #014554 !important;
      color: #e5e7eb !important;
      border: none !important;
    }
    .leaflet-control-zoom-in:hover,
    .leaflet-control-zoom-out:hover {
      background: #025f73 !important;
      color: #fff !important;
    }

    /* ── Mobile: centered bottom bar ── */
    @media (max-width: 768px) {
      #sidebar {
        /* Unset desktop positioning */
        top: auto;
        left: 50%;
        transform: translateX(-50%);

        /* Anchor to bottom */
        bottom: 20px;

        width: calc(100% - 40px);
        max-width: 420px;

        border-radius: 16px;
        padding: 12px 16px;
      }

      #app.sidebar-collapsed #sidebar {
        width: calc(100% - 40px);
        max-width: 420px;
        padding: 10px 16px;
      }

      /* Keep header row on mobile */
      #sidebar-header {
        flex-direction: row;
        justify-content: space-between;
      }

      /* On mobile: title stays visible even when collapsed */
      #app.sidebar-collapsed #sidebar-header h2 {
        opacity: 1;
        pointer-events: auto;
      }

      /* On mobile: chevron points up when expanded (panel above), down when collapsed */
      #toggleBtn svg { transform: rotate(-90deg); }
      #app.sidebar-collapsed #toggleBtn svg { transform: rotate(90deg); }
    }
  </style>
</head>

<body>
<div id="app">
  <div id="map"></div>

  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Walkable WMATA</h2>
      <button id="toggleBtn" aria-label="Toggle sidebar">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="10,3 5,8 10,13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div id="sidebar-content" class="expanded">
      <p style="margin: 0 0 8px;">Precomputed walking sheds (no API calls)</p>
      <label for="stationSelect">Select a Station from the dropdown:</label>
      <select id="stationSelect"></select>
      <div class="checkboxes">
        <label><input type="checkbox" value="5" checked> 5 minutes</label>
        <label><input type="checkbox" value="10" checked> 10 minutes</label>
        <label><input type="checkbox" value="15" checked> 15 minutes</label>
        <label><input type="checkbox" value="20" checked> 20 minutes</label>
      </div>
      <button id="drawBtn">Show walksheds</button>
    </div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* --------------------------------------------------
   BASIC MAP SETUP
-------------------------------------------------- */

const map = L.map("map", { zoomControl: false }).setView([38.905, -77.036], 12);
L.control.zoom({ position: "topright" }).addTo(map);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ',
  maxZoom: 16
}).addTo(map);

const walkshedLayer = L.layerGroup().addTo(map);
let stationMarker = null;

/* Define the colors of the metro lines */
const LINE_COLORS = {
  RD: "#E5262E",
  BL: "#1574C4",
  OR: "#F7941D",
  SV: "#A0A2A0",
  GR: "#00A65C",
  YL: "#FFD32A"
};

/* --------------------------------------------------
   LOAD STATIONS GEOJSON
-------------------------------------------------- */

let stationLookup = {};

async function loadStations() {
  const data = await fetch("stations.geojson").then(r => r.json());
  data.features.forEach(f => {
    const code = f.properties.code;
    const name = f.properties.name;
    const existing = Object.values(stationLookup).find(s => s.name === name);
    if (existing) {
      f.properties.lines.forEach(line => {
        if (!existing.lines.includes(line)) existing.lines.push(line);
      });
    } else {
      stationLookup[code] = {
        name:  name,
        lat:   f.geometry.coordinates[1],
        lon:   f.geometry.coordinates[0],
        lines: [...f.properties.lines]
      };
    }
  });
  drawStations();
}

/* --------------------------------------------------
   LOAD WALKSHED GEOJSON
-------------------------------------------------- */

let walkshedData = null;

async function loadWalksheds() {
  walkshedData = await fetch("walksheds.geojson")
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .catch(err => { console.error("Failed to load walksheds:", err); });
  populateStationDropdown();
}

loadStations();
loadWalksheds();

/* --------------------------------------------------
   UI HELPERS
-------------------------------------------------- */

function populateStationDropdown() {
  const select = document.getElementById("stationSelect");
  const stationIds = [
    ...new Set(walkshedData.features.map(f => f.properties.station_name))
  ].sort();
  stationIds.forEach(id => {
    const option = document.createElement("option");
    option.value = id;
    option.textContent = id;
    select.appendChild(option);
  });
}

function selectedMinutes() {
  return Array.from(
    document.querySelectorAll(".checkboxes input:checked")
  ).map(cb => Number(cb.value));
}

/* --------------------------------------------------
   DRAW WALKSHEDS
-------------------------------------------------- */

function colorForMinutes(min) {
  if (min === 5)  return "#22c55e";
  if (min === 10) return "#f59e0b";
  return "#ef4444";
}

/* --------------------------------------------------
   DRAW ALL STATIONS ON LOAD
-------------------------------------------------- */

function buildMarkerSVG(lines) {
  const OUTER_R = 16, MID_R = 10, GAP = 1.5, SIZE = 40, CX = SIZE / 2, CY = SIZE / 2;
  const sliceAngle = 360 / lines.length;

  function polarToCartesian(cx, cy, r, angleDeg) {
    const rad = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  function slicePath(cx, cy, outerR, innerR, startAngle, endAngle) {
    const o1 = polarToCartesian(cx, cy, outerR, startAngle);
    const o2 = polarToCartesian(cx, cy, outerR, endAngle);
    const i1 = polarToCartesian(cx, cy, innerR, endAngle);
    const i2 = polarToCartesian(cx, cy, innerR, startAngle);
    const large = (endAngle - startAngle) > 180 ? 1 : 0;
    return `M ${o1.x} ${o1.y} A ${outerR} ${outerR} 0 ${large} 1 ${o2.x} ${o2.y} L ${i1.x} ${i1.y} A ${innerR} ${innerR} 0 ${large} 0 ${i2.x} ${i2.y} Z`;
  }

  let shapes = "";
  if (lines.length === 1) {
    shapes = `<circle cx="${CX}" cy="${CY}" r="${MID_R - GAP}" fill="${LINE_COLORS[lines[0]]}"/>`;
  } else {
    lines.forEach((line, i) => {
      shapes += `<path d="${slicePath(CX, CY, OUTER_R, MID_R + GAP, i * sliceAngle, (i + 1) * sliceAngle)}" fill="${LINE_COLORS[line]}"/>`;
    });
    shapes += `<circle cx="${CX}" cy="${CY}" r="${MID_R}" fill="#111827"/>`;
    shapes += `<circle cx="${CX}" cy="${CY}" r="${MID_R - GAP}" fill="white"/>`;
  }

  return `<svg width="${SIZE}" height="${SIZE}" xmlns="http://www.w3.org/2000/svg">${shapes}</svg>`;
}

function drawStations() {
  Object.values(stationLookup).forEach(station => {
    const size = station.lines.length === 1 ? 20 : 40;
    const icon = L.divIcon({
      html:       buildMarkerSVG(station.lines),
      className:  "",
      iconSize:   [size, size],
      iconAnchor: [size / 2, size / 2]
    });
    L.marker([station.lat, station.lon], { icon })
      .bindTooltip(station.name, { permanent: false })
      .addTo(map);
  });
}

function drawWalksheds() {
  if (!walkshedData) return;

  const stationId = document.getElementById("stationSelect").value;
  const minutes = selectedMinutes();

  walkshedLayer.clearLayers();

  const filtered = {
    type: "FeatureCollection",
    features: walkshedData.features.filter(f =>
      f.properties.station_name === stationId &&
      minutes.includes(f.properties.minutes)
    )
  };

  const geojsonLayer = L.geoJSON(filtered, {
    style: f => ({
      color: colorForMinutes(f.properties.minutes),
      weight: 1,
      fillOpacity: 0.3
    })
  }).addTo(walkshedLayer);

  if (stationMarker) map.removeLayer(stationMarker);

  if (filtered.features.length > 0) {
    map.fitBounds(geojsonLayer.getBounds().pad(0.2));
  }
}

document.getElementById("drawBtn").addEventListener("click", drawWalksheds);

/* JS for collapsible sidebar */
document.getElementById("toggleBtn").addEventListener("click", () => {
  const content = document.getElementById("sidebar-content");
  const app = document.getElementById("app");
  content.classList.toggle("collapsed");
  content.classList.toggle("expanded");
  app.classList.toggle("sidebar-collapsed");
});
</script>
</body>
</html>
