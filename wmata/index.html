<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Walkable WMATA (Precomputed Walksheds)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<!-- Load fonts (open source only) -->
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

 <!-- Helvitica is WMATA official font, rest are backups -->
  <style>
    html, body { height: 100%; margin: 0; font-family: Helvetica, Arial, Inter, sans-serif; } 
    #app { display: grid; grid-template-columns: 320px 1fr; height: 100%; }
    #sidebar {
      padding: 16px;
      background: #014554;
      color: #e5e7eb;
      border-right: 1px solid #1f2937;
    }
    #app.sidebar-collapsed {
  grid-template-columns: 60px 1fr;
}
/* Header with toggle button */
#sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-width: 0;
}

#app.sidebar-collapsed #sidebar-header h2 {
  display: none;
}

#toggleBtn {
  display: block;
  width: auto;
  padding: 6px 10px;
  background: transparent;
  color: #e5e7eb;
  border: 1px solid #e5e7eb;
  font-size: 18px;
  cursor: pointer;
  margin-top: 0;
  flex-shrink: 0;
}

#sidebar-content {
  overflow: hidden;
  transition: max-height 0.3s ease;
}

#sidebar-content.collapsed {
  max-height: 0;
}

#sidebar-content.expanded {
  max-height: 500px;
}

@media (max-width: 768px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }

  #sidebar {
    width: 100%;
  }

  /* Keep the header row layout consistent on mobile */
  #sidebar-header {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }

  /* When collapsed on mobile, sidebar only takes up header height */
  #app.sidebar-collapsed {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }

  /* Prevent collapsed sidebar from shrinking the map on mobile */
  #app.sidebar-collapsed #sidebar {
    height: auto;
    min-height: 0;
  }
}

    #map { width: 100%; height: 100%; }
    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #0b1220;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 6px;
    }
    button {
      background: #1BBF54;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
    }
    .checkboxes label {
      display: block;
      margin-top: 6px;
    }
    .checkboxes input[type="checkbox"] {
      accent-color: #1BBF54;
    }
  </style>
</head>

<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Walkable WMATA</h2>
      <button id="toggleBtn" aria-label="Toggle sidebar">☰</button>
    </div>
    <div id="sidebar-content" class="expanded">
      <p>Precomputed walking sheds (no API calls)</p>
      <label for="stationSelect">Select a Station from the dropdown:</label>
      <select id="stationSelect"></select>
      <div class="checkboxes">
        <label><input type="checkbox" value="5" checked> 5 minutes</label>
        <label><input type="checkbox" value="10" checked> 10 minutes</label>
        <label><input type="checkbox" value="15" checked> 15 minutes</label>
        <label><input type="checkbox" value="20" checked> 20 minutes</label>
      </div>
      <button id="drawBtn">Show walksheds</button>
    </div>                                         
  </aside>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* --------------------------------------------------
   BASIC MAP SETUP 
-------------------------------------------------- */

const map = L.map("map").setView([38.905, -77.036], 12);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

const walkshedLayer = L.layerGroup().addTo(map);
let stationMarker = null;

/* Define the colors of the metro lines*/
const LINE_COLORS = {
  RD: "#E5262E",
  BL: "#1574C4",
  OR: "#F7941D",
  SV: "#A0A2A0",
  GR: "#00A65C",
  YL: "#FFD32A"
};

/* --------------------------------------------------
   LOAD STATIONS GEOJSON                       
   Reads stations.geojson and builds a lookup
   table so we can find any station by its code. Also
   references/stores stations by name so two level stations
   like Metro Center, L'Enfant, etc. will display as 
   one combined symbol on the map.
-------------------------------------------------- */

let stationLookup = {};                              

async function loadStations() {
  const data = await fetch("stations.geojson").then(r => r.json());
  // Merge duplicates — some codes share a physical station (e.g. Metro Center)
  data.features.forEach(f => {
    const code = f.properties.code;
    const name = f.properties.name;

    // Check if a station with this name already exists under a different code
    const existing = Object.values(stationLookup).find(s => s.name === name);

    if (existing) {
      // Merge lines into the existing entry
      f.properties.lines.forEach(line => {
        if (!existing.lines.includes(line)) {
          existing.lines.push(line);
        }
      });
    } else {
      // New station — store it under its code
      stationLookup[code] = {
        name:  name,
        lat:   f.geometry.coordinates[1],
        lon:   f.geometry.coordinates[0],
        lines: [...f.properties.lines]
      };
    }
  });
  drawStations();
}                                                  

/* --------------------------------------------------
   LOAD WALKSHED GEOJSON
-------------------------------------------------- */

let walkshedData = null;

async function loadWalksheds() {
  walkshedData = await fetch("walksheds.geojson")
    .then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); })
    .catch(err => { console.error("Failed to load walksheds:", err); });
  populateStationDropdown();
}

// Load both files at startup but individually so stations always loads
loadStations();
loadWalksheds();

/* --------------------------------------------------
   UI HELPERS
-------------------------------------------------- */

function populateStationDropdown() {
  const select = document.getElementById("stationSelect");

  const stationIds = [
    ...new Set(walkshedData.features.map(f => f.properties.station_name))
  ].sort();

  stationIds.forEach(id => {
    const option = document.createElement("option");
    option.value = id;
    option.textContent = id;
    select.appendChild(option);
  });
}

function selectedMinutes() {
  return Array.from(
    document.querySelectorAll(".checkboxes input:checked")
  ).map(cb => Number(cb.value));
}

/* --------------------------------------------------
   DRAW WALKSHEDS
-------------------------------------------------- */

function colorForMinutes(min) {
  if (min === 5)  return "#22c55e";
  if (min === 10) return "#f59e0b";
  return "#ef4444";                                  // fallback for any other value
}

/* --------------------------------------------------
   DRAW ALL STATIONS ON LOAD
-------------------------------------------------- */

/*Create station markers showing line colors*/
function buildMarkerSVG(lines) {
  const OUTER_R = 16, MID_R = 10, GAP = 1.5, SIZE = 40, CX = SIZE / 2, CY = SIZE / 2;
  const sliceAngle = 360 / lines.length;

  function polarToCartesian(cx, cy, r, angleDeg) {
    const rad = (angleDeg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  function slicePath(cx, cy, outerR, innerR, startAngle, endAngle) {
    const o1 = polarToCartesian(cx, cy, outerR, startAngle);
    const o2 = polarToCartesian(cx, cy, outerR, endAngle);
    const i1 = polarToCartesian(cx, cy, innerR, endAngle);
    const i2 = polarToCartesian(cx, cy, innerR, startAngle);
    const large = (endAngle - startAngle) > 180 ? 1 : 0;
    return `M ${o1.x} ${o1.y} A ${outerR} ${outerR} 0 ${large} 1 ${o2.x} ${o2.y} L ${i1.x} ${i1.y} A ${innerR} ${innerR} 0 ${large} 0 ${i2.x} ${i2.y} Z`;
  }

  let shapes = "";

  if (lines.length === 1) {
    shapes = `<circle cx="${CX}" cy="${CY}" r="${MID_R - GAP}" fill="${LINE_COLORS[lines[0]]}"/>`;
  } else {
    lines.forEach((line, i) => {
      shapes += `<path d="${slicePath(CX, CY, OUTER_R, MID_R + GAP, i * sliceAngle, (i + 1) * sliceAngle)}" fill="${LINE_COLORS[line]}"/>`;
    });
    shapes += `<circle cx="${CX}" cy="${CY}" r="${MID_R}" fill="#111827"/>`;
    shapes += `<circle cx="${CX}" cy="${CY}" r="${MID_R - GAP}" fill="white"/>`;
  }

  return `<svg width="${SIZE}" height="${SIZE}" xmlns="http://www.w3.org/2000/svg">${shapes}</svg>`;
}
/* end station marker construction code*/

function drawStations() {
  Object.values(stationLookup).forEach(station => {
    const size = station.lines.length === 1 ? 20 : 40;

    const icon = L.divIcon({
      html:       buildMarkerSVG(station.lines),
      className:  "",
      iconSize:   [size, size],
      iconAnchor: [size / 2, size / 2]
    });

    L.marker([station.lat, station.lon], { icon })
      .bindTooltip(station.name, { permanent: false })
      .addTo(map);
  });
}

function drawWalksheds() {
  if (!walkshedData) return;                         // ← NEW: guard against early click

  const stationId = document.getElementById("stationSelect").value;
  const minutes = selectedMinutes();

  walkshedLayer.clearLayers();

  const filtered = {
    type: "FeatureCollection",
    features: walkshedData.features.filter(f =>
      f.properties.station_name === stationId &&
      minutes.includes(f.properties.minutes)
    )
  };

  const geojsonLayer = L.geoJSON(filtered, {
    style: f => ({
      color: colorForMinutes(f.properties.minutes),
      weight: 1,
      fillOpacity: 0.3
    })
  }).addTo(walkshedLayer);

  if (stationMarker) map.removeLayer(stationMarker);

  if (filtered.features.length > 0) {
    map.fitBounds(geojsonLayer.getBounds().pad(0.2));
  }
}

document.getElementById("drawBtn").addEventListener("click", drawWalksheds);

/* JS for collapsible menu */

document.getElementById("toggleBtn").addEventListener("click", () => {
  const content = document.getElementById("sidebar-content");
  const app = document.getElementById("app");
  content.classList.toggle("collapsed");
  content.classList.toggle("expanded");
  app.classList.toggle("sidebar-collapsed");
});

</script>
</body>
</html>
